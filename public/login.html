<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Lead Agent AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#07090F; --bg3:#161B24; --card:rgba(22,27,36,.85);
      --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.13);
      --blue:#4F8EF7; --blue-dark:#2F6FE8; --blue-glow:rgba(79,142,247,.18);
      --green:#34D399; --red:#F87171; --text:#E8EEF6; --text2:#8892A0; --text3:#3D4550;
      --font:'Inter',system-ui,sans-serif;
      --shadow:0 0 0 1px rgba(255,255,255,.05), 0 12px 40px rgba(0,0,0,.5);
    }
    html, body { min-height:100%; font-family:var(--font); background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none;
      background:
        radial-gradient(ellipse 90% 55% at 50% -10%, rgba(79,142,247,.09), transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 47px, rgba(255,255,255,.018) 48px),
        repeating-linear-gradient(90deg, transparent, transparent 47px, rgba(255,255,255,.018) 48px);
    }
    .wrap { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 16px; gap:22px; }
    .brand { display:flex; align-items:center; gap:14px; }
    .brand-icon {
      width:46px; height:46px; border-radius:12px;
      background:linear-gradient(135deg,var(--blue-dark),#A78BFA);
      display:flex; align-items:center; justify-content:center;
      box-shadow:0 0 24px rgba(79,142,247,.35); font-size:23px;
    }
    .brand h1 { font-size:20px; font-weight:800; letter-spacing:-.4px; }
    .brand p  { font-size:12px; color:var(--text2); }
    .card {
      width:100%; max-width:400px;
      background:var(--card); border:1px solid var(--border); border-radius:14px;
      backdrop-filter:blur(16px); box-shadow:var(--shadow); padding:26px 28px 30px;
    }
    .tabs { display:flex; background:rgba(255,255,255,.04); border:1px solid var(--border2); border-radius:9px; padding:3px; gap:2px; margin-bottom:22px; }
    .tab {
      flex:1; padding:8px 0; border:none; border-radius:7px; background:transparent;
      color:var(--text2); font-family:var(--font); font-size:13px; font-weight:500; cursor:pointer; transition:all .18s;
    }
    .tab.active { background:linear-gradient(135deg,var(--blue-dark),#7C3AED); color:#fff; box-shadow:0 2px 10px rgba(79,142,247,.3); }
    .field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
    .field label { font-size:12px; font-weight:500; color:var(--text2); padding-left:2px; }
    .field input[type=email], .field input[type=password] {
      width:100%; padding:11px 13px; background:rgba(255,255,255,.04);
      border:1px solid var(--border2); border-radius:8px;
      color:var(--text); font-family:var(--font); font-size:14px; outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    .field input:focus { border-color:var(--blue); box-shadow:0 0 0 3px var(--blue-glow); }
    .hint { font-size:11px; color:var(--text3); padding-left:2px; }
    .termos { display:flex; align-items:flex-start; gap:9px; margin:4px 0 16px; font-size:12.5px; color:var(--text2); }
    .termos input { margin-top:3px; accent-color:var(--blue); }
    .termos a { color:var(--blue); text-decoration:none; }
    .btn {
      width:100%; display:inline-flex; align-items:center; justify-content:center; gap:8px;
      height:44px; border:none; border-radius:8px;
      background:linear-gradient(135deg,var(--blue-dark) 0%,#7C3AED 100%);
      color:#fff; font-family:var(--font); font-size:14px; font-weight:600; cursor:pointer;
      box-shadow:0 4px 16px rgba(79,142,247,.3); transition:opacity .2s, transform .1s;
    }
    .btn:hover:not(:disabled){ opacity:.9; } .btn:active:not(:disabled){ transform:scale(.98); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .btn-ghost {
      background:rgba(255,255,255,.05); box-shadow:none; border:1px solid var(--border2);
      color:var(--text); font-weight:500; margin-top:10px;
    }
    .links { text-align:center; margin-top:16px; font-size:12.5px; }
    .links a { color:var(--text2); text-decoration:none; }
    .links a:hover { color:var(--blue); }
    .msg { display:none; border-radius:8px; padding:11px 13px; font-size:13px; line-height:1.5; margin-bottom:16px; }
    .msg.show { display:block; animation:slideIn .2s ease-out; }
    .msg.erro    { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.3); color:var(--red); }
    .msg.sucesso { background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.3); color:var(--green); }
    .view { display:none; } .view.show { display:block; }
    @keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    .spinner { width:15px; height:15px; animation:spin .9s linear infinite; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <div>
      <h1>Lead Agent AI</h1>
      <p>Geração inteligente de leads B2B no Brasil</p>
    </div>
  </div>

  <div class="card">
    <div class="tabs" id="tabs">
      <button class="tab active" id="tabLogin" onclick="mostrarView('login')">Entrar</button>
      <button class="tab" id="tabCadastro" onclick="mostrarView('cadastro')">Criar conta</button>
    </div>

    <div class="msg" id="msg"></div>

    <!-- ── Login (1.2) ── -->
    <div class="view show" id="viewLogin">
      <form onsubmit="entrar(event)">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" autocomplete="email" required />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="loginSenha" autocomplete="current-password" required />
        </div>
        <button class="btn" id="btnEntrar" type="submit">Entrar</button>
      </form>
      <button class="btn btn-ghost" id="btnReenviar" style="display:none" onclick="reenviarConfirmacao()">
        Reenviar link de confirmação
      </button>
      <div class="links"><a href="#" onclick="mostrarView('esqueci');return false;">Esqueci minha senha</a></div>
    </div>

    <!-- ── Cadastro (1.1) ── -->
    <div class="view" id="viewCadastro">
      <form onsubmit="cadastrar(event)">
        <div class="field">
          <label>Email</label>
          <input type="email" id="cadEmail" autocomplete="email" required />
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="cadSenha" autocomplete="new-password" minlength="8" required />
          <span class="hint">Mínimo de 8 caracteres</span>
        </div>
        <div class="field">
          <label>Confirmar senha</label>
          <input type="password" id="cadSenha2" autocomplete="new-password" minlength="8" required />
        </div>
        <label class="termos">
          <input type="checkbox" id="cadTermos" required />
          <span>Li e aceito os <a href="/termos.html" target="_blank">Termos de Uso</a>.</span>
        </label>
        <button class="btn" id="btnCadastrar" type="submit">Criar conta</button>
      </form>
      <div class="links" style="margin-top:12px; color:var(--text3); font-size:11.5px;">
        Você receberá um email para confirmar a conta — e ganha 20 créditos de teste. 🎁
      </div>
    </div>

    <!-- ── Esqueci minha senha (1.3) ── -->
    <div class="view" id="viewEsqueci">
      <form onsubmit="recuperarSenha(event)">
        <div class="field">
          <label>Email da conta</label>
          <input type="email" id="escEmail" autocomplete="email" required />
        </div>
        <button class="btn" id="btnRecuperar" type="submit">Enviar link de redefinição</button>
      </form>
      <div class="links"><a href="#" onclick="mostrarView('login');return false;">← Voltar para o login</a></div>
    </div>
  </div>
</div>

<script src="/config.js"></script>
<script src="/vendor/supabase.js"></script>
<script src="/js/auth.js"></script>
<script>
  /* ── Navegação entre views ── */
  function mostrarView(v) {
    limparMsg();
    document.getElementById('viewLogin').classList.toggle('show',    v === 'login');
    document.getElementById('viewCadastro').classList.toggle('show', v === 'cadastro');
    document.getElementById('viewEsqueci').classList.toggle('show',  v === 'esqueci');
    document.getElementById('tabLogin').classList.toggle('active',    v !== 'cadastro');
    document.getElementById('tabCadastro').classList.toggle('active', v === 'cadastro');
    document.getElementById('tabs').style.display = v === 'esqueci' ? 'none' : 'flex';
  }

  function mostrarMsg(tipo, texto) {
    const el = document.getElementById('msg');
    el.className = `msg show ${tipo}`;
    el.textContent = texto;
  }
  function limparMsg() {
    document.getElementById('msg').className = 'msg';
    document.getElementById('btnReenviar').style.display = 'none';
  }

  function carregando(idBtn, on, rotulo) {
    const btn = document.getElementById(idBtn);
    btn.disabled = on;
    btn.innerHTML = on
      ? `<svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-6.2-8.56"/></svg>Aguarde…`
      : rotulo;
  }

  /* Erros sempre genéricos — não revelamos se o email existe (história 1.2) */
  function traduzErro(msg) {
    const m = (msg || '').toLowerCase();
    if (m.includes('invalid login credentials'))     return 'Credenciais inválidas.';
    if (m.includes('email not confirmed'))           return 'EMAIL_NAO_CONFIRMADO';
    if (m.includes('password should be at least'))   return 'A senha deve ter no mínimo 8 caracteres.';
    if (m.includes('rate limit') || m.includes('too many')) return 'Muitas tentativas. Aguarde alguns minutos e tente de novo.';
    if (m.includes('failed to fetch'))               return 'Falha de conexão. Verifique sua internet.';
    return 'Não foi possível concluir. Tente novamente.';
  }

  /* ── Início: já logado → app; erro no link (expirado) → mensagem ── */
  (async () => {
    if (!supabaseDisponivel()) {
      mostrarMsg('erro', 'O servidor ainda não tem as chaves do Supabase configuradas no .env (veja supabase/README.md).');
      return;
    }
    const hashParams = new URLSearchParams(location.hash.slice(1));
    if (hashParams.get('error_description')) {
      mostrarMsg('erro', 'Link inválido ou expirado. Faça login ou solicite um novo link.');
      history.replaceState(null, '', location.pathname);
      return;
    }
    // O link de confirmação redireciona para cá já com sessão no URL
    const session = await sessaoAtual();
    if (session) location.href = '/';
  })();

  /* ── Login (1.2) ── */
  let emailNaoConfirmado = null;

  async function entrar(ev) {
    ev.preventDefault();
    limparMsg();
    carregando('btnEntrar', true, 'Entrar');
    const email = document.getElementById('loginEmail').value.trim();
    const senha = document.getElementById('loginSenha').value;

    const { error } = await sb.auth.signInWithPassword({ email, password: senha });
    carregando('btnEntrar', false, 'Entrar');

    if (error) {
      const msg = traduzErro(error.message);
      if (msg === 'EMAIL_NAO_CONFIRMADO') {
        emailNaoConfirmado = email;
        mostrarMsg('erro', 'Seu email ainda não foi confirmado. Verifique sua caixa de entrada (e o spam).');
        document.getElementById('btnReenviar').style.display = 'inline-flex';
      } else {
        mostrarMsg('erro', msg);
      }
      return;
    }
    location.href = '/';
  }

  /* Reenvio do link de confirmação (história 1.1) */
  async function reenviarConfirmacao() {
    if (!emailNaoConfirmado) return;
    carregando('btnReenviar', true, 'Reenviar link de confirmação');
    const { error } = await sb.auth.resend({
      type: 'signup',
      email: emailNaoConfirmado,
      options: { emailRedirectTo: `${location.origin}/login.html` },
    });
    carregando('btnReenviar', false, 'Reenviar link de confirmação');
    if (error) mostrarMsg('erro', traduzErro(error.message));
    else       mostrarMsg('sucesso', 'Link reenviado! Confira seu email.');
  }

  /* ── Cadastro (1.1) ── */
  async function cadastrar(ev) {
    ev.preventDefault();
    limparMsg();
    const email  = document.getElementById('cadEmail').value.trim();
    const senha  = document.getElementById('cadSenha').value;
    const senha2 = document.getElementById('cadSenha2').value;

    if (senha.length < 8)  return mostrarMsg('erro', 'A senha deve ter no mínimo 8 caracteres.');
    if (senha !== senha2)  return mostrarMsg('erro', 'As senhas não conferem.');
    if (!document.getElementById('cadTermos').checked)
      return mostrarMsg('erro', 'É preciso aceitar os Termos de Uso.');

    carregando('btnCadastrar', true, 'Criar conta');
    const { error } = await sb.auth.signUp({
      email,
      password: senha,
      options: {
        // registro do aceite dos Termos com data — vai para profiles via trigger
        data: { termos_aceitos_em: new Date().toISOString() },
        emailRedirectTo: `${location.origin}/login.html`,
      },
    });
    carregando('btnCadastrar', false, 'Criar conta');

    if (error) return mostrarMsg('erro', traduzErro(error.message));
    mostrarMsg('sucesso', `Enviamos um link de confirmação para ${email}. Confirme para ativar a conta e ganhar seus 20 créditos de teste.`);
  }

  /* ── Recuperação de senha (1.3) ── */
  async function recuperarSenha(ev) {
    ev.preventDefault();
    limparMsg();
    const email = document.getElementById('escEmail').value.trim();
    carregando('btnRecuperar', true, 'Enviar link de redefinição');
    await sb.auth.resetPasswordForEmail(email, {
      redirectTo: `${location.origin}/redefinir-senha.html`,
    });
    carregando('btnRecuperar', false, 'Enviar link de redefinição');
    // resposta idêntica exista o email ou não — não revela cadastro
    mostrarMsg('sucesso', 'Se este email estiver cadastrado, você receberá um link de redefinição em instantes.');
  }
</script>
</body>
</html>
